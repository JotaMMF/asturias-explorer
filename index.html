<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asturias Explorer</title>
  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111a2e">
</head>
<body>

<header>
  <h1>🌄 Asturias Explorer</h1>

  <div class="controls">
    <button id="installBtn" style="display:none;">Install App</button>
    <input id="search" placeholder="Search places or towns..." />
    
    <select id="filter">
      <option value="all">All</option>
      <option value="nature">Nature</option>
      <option value="beach">Beaches</option>
      <option value="city_walk">Cities</option>
      <option value="village">Villages</option>
      <option value="park">Parks</option>
    </select>
  </div>
</header>

<main>
  <div id="grid"></div>
</main>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Service Worker registered"))
      .catch(err => console.log("SW error", err));
  }
</script>
</body>
</html>
