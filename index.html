<!DOCTYPE html>
<html lang="es">

<head>
  <!-- =========================================
       METADATOS BÁSICOS
  ========================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Explorador de Asturias</title>

  <!-- =========================================
       SEO BÁSICO
  ========================================== -->
  <meta name="description" content="Descubre lugares de Asturias con información honesta: playas, pueblos, montañas y rutas de naturaleza.">
  <meta name="keywords" content="Asturias, turismo, rutas, naturaleza, playas, Picos de Europa, Gijón, Oviedo">
  <meta name="author" content="Asturias Explorer">

  <!-- =========================================
       OPEN GRAPH (REDES SOCIALES)
  ========================================== -->
  <meta property="og:title" content="Asturias Explorer">
  <meta property="og:description" content="Explora Asturias con una guía honesta de lugares, playas y naturaleza.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://picsum.photos/seed/asturias/1200/630">
  <meta property="og:url" content="https://tuusuario.github.io/tu-repo/">

  <!-- =========================================
       TWITTER CARD
  ========================================== -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- =========================================
       GOOGLE FONTS
  ========================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- =========================================
       PWA CONFIG
  ========================================== -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111a2e">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================================
       CABECERA PRINCIPAL
  ========================================== -->
  <header>
    <h1>🌄 Explorador de Asturias</h1>

    <p>Guía honesta de lugares turísticos, naturaleza y pueblos</p>

    <!-- CONTROLES -->
    <div class="controls">

      <!-- Botón instalación PWA -->
      <button id="installBtn" style="display:none;">
        Instalar App
      </button>

      <!-- Buscador -->
      <input
        id="search"
        type="search"
        placeholder="Buscar lugares o pueblos..."
        aria-label="Buscar lugares de Asturias"
      />

      <!-- Filtro -->
      <select id="filter" aria-label="Filtrar por tipo de lugar">
        <option value="all">Todos</option>
        <option value="nature">Naturaleza</option>
        <option value="beach">Playas</option>
        <option value="city_walk">Ciudades</option>
        <option value="village">Pueblos</option>
        <option value="park">Parques</option>
      </select>

    </div>
  </header>

  <!-- =========================================
       CONTENIDO PRINCIPAL
  ========================================== -->
  <main>

    <section aria-label="Listado de lugares de Asturias">
      <div id="grid"></div>
    </section>

  </main>

  <!-- =========================================
       SCRIPTS
  ========================================== -->
  <script src="script.js"></script>

  <script>
    /**
     * =========================================
     * SERVICE WORKER (PWA)
     * =========================================
     * Permite funcionamiento offline y caché.
     */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker registrado correctamente"))
        .catch(err => console.log("Error en Service Worker", err));
    }
  </script>

</body>
</html>
