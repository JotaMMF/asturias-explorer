<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8">
  <!-- Hace que la web sea responsive en móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Explorador de Asturias</title>

  <!-- Hoja de estilos principal -->
  <link rel="stylesheet" href="style.css">

  <!-- Archivo de configuración para convertir la web en PWA (Progressive Web App) -->
  <link rel="manifest" href="manifest.json">

  <!-- Color del tema para navegadores móviles -->
  <meta name="theme-color" content="#111a2e">
</head>

<body>

  <!-- Cabecera principal -->
  <header>
    <h1>🌄 Explorador de Asturias</h1>

    <!-- Controles de la aplicación -->
    <div class="controls">
      
      <!-- Botón para instalar la app (PWA). Se muestra dinámicamente con JS -->
      <button id="installBtn" style="display:none;">Instalar App</button>
      
      <!-- Campo de búsqueda -->
      <input 
        id="search" 
        placeholder="Buscar lugares o pueblos..." 
      />
      
      <!-- Filtro por categorías -->
      <select id="filter">
        <option value="all">Todos</option>
        <option value="nature">Naturaleza</option>
        <option value="beach">Playas</option>
        <option value="city_walk">Ciudades</option>
        <option value="village">Pueblos</option>
        <option value="park">Parques</option>
      </select>
    </div>
  </header>

  <!-- Contenido principal -->
  <main>
    <!-- Contenedor donde se renderizarán los lugares dinámicamente -->
    <div id="grid"></div>
  </main>

  <!-- Script principal de la aplicación -->
  <script src="script.js"></script>

  <script>
    /**
     * Registro del Service Worker
     * Permite funcionalidades offline y mejora el rendimiento (PWA)
     */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker registrado correctamente"))
        .catch(err => console.log("Error en Service Worker", err));
    }
  </script>

</body>
</html>
